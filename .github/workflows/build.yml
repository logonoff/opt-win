name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: ./build.sh

      - name: Package zip
        run: cd build && ditto -c -k --keepParent OptWin.app OptWin.zip

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "## Changes" > notes.md
          git log --format="- %h %s" "${PREV_TAG}..HEAD" >> notes.md

      - name: Create draft release
        run: gh release create "${{ github.ref_name }}" build/OptWin.zip --draft --title "${{ github.ref_name }}" --notes-file notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
