name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: ./build.sh

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: OptWin
          path: build/OptWin.app
